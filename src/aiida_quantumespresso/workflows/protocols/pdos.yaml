default_inputs:
    clean_workdir: False
    scf:
        pw:
            parameters:
                CONTROL:
                    restart_mode: from_scratch
    nscf:
        kpoints_distance: 0.10
        pw:
            parameters:
                CONTROL:
                    calculation: nscf
                    restart_mode: from_scratch
                SYSTEM:
                    occupations: tetrahedra_opt
                    nosym: True
    dos:
        parameters:
            DOS:
                DeltaE: 0.01
        metadata:
            options:
                max_wallclock_seconds: 43200  # Twelve hours
                withmpi: True
    projwfc:
        parameters:
            PROJWFC:
                DeltaE: 0.01
        metadata:
            options:
                max_wallclock_seconds: 43200  # Twelve hours
                withmpi: True
default_protocol: balanced
protocols:
    balanced:
        description: 'Protocol to perform a projected density of states calculation at normal precision at moderate computational cost.'
    stringent:
        description: 'Protocol to perform a projected density of states structure calculation at high precision at higher computational cost.'
        dos:
            parameters:
                DOS:
                    DeltaE: 0.01
        projwfc:
            parameters:
                PROJWFC:
                    DeltaE: 0.01
        nscf:
            kpoints_distance: 0.05
    fast:
        description: 'Protocol to perform a projected density of states structure calculation at low precision at minimal computational cost for testing purposes.'
        dos:
            parameters:
                DOS:
                    DeltaE: 0.1
        projwfc:
            parameters:
                PROJWFC:
                    DeltaE: 0.1
        nscf:
            kpoints_distance: 0.5
# List of "meta inputs", which are not direct inputs of the process. Used for validation of the overrides
meta_inputs_schema:
    scf: &pw_base_meta
        meta_parameters:
            conv_thr_per_atom:
            etot_conv_thr_per_atom:
        pseudo_family:
    nscf: *pw_base_meta
